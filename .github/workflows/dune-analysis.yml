name: Dune API Analysis

on:
  workflow_dispatch:
    inputs:
      query_id:
        description: "Dune query ID"
        required: true
        type: string
      parameters:
        description: 'Optional JSON object for query params, e.g. {"wallet":"0x..."}'
        required: false
        type: string
      timeout_seconds:
        description: "How long to wait before timing out"
        default: "300"
        required: false
        type: string

jobs:
  run-dune-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute Dune query
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: |
          python scripts/dune_analysis.py \
            --query-id "${{ github.event.inputs.query_id }}" \
            --parameters '${{ github.event.inputs.parameters }}' \
            --timeout-seconds "${{ github.event.inputs.timeout_seconds }}" \
            --output-csv artifacts/dune_results.csv \
            --output-json artifacts/dune_results.json

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dune-analysis-results
          path: artifacts/
