<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ouroboros Temple</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background:#0f1115; color:#e6e9ef; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 20px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    button { background:#4f7cff; color:white; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; }
    button.secondary { background:#2d333b; }
    input, select { background:#181c23; border:1px solid #2d333b; color:#e6e9ef; padding:8px; border-radius:8px; }
    .card { background:#151922; border:1px solid #2a3040; border-radius:12px; padding:14px; margin-top:14px; }
    .tag { font-size:12px; border:1px solid #32405f; padding:3px 8px; border-radius:999px; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:8px; border-bottom:1px solid #2d333b; font-size:14px; }
    code { background:#1a1f2b; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Ouroboros Temple</h1>
  <div class="row">
    <span id="solanaTag" class="tag">Solana Pending</span>
    <span id="tempTag" class="tag">System Temp: 1.000</span>
    <span id="streamTag" class="tag">Bridge Stream: Connecting...</span>
  </div>

  <div class="card">
    <h3>Create Triple-Entry Bid</h3>
    <div class="row">
      <input id="name" placeholder="name" value="Monitor Alpha" />
      <input id="amount" type="number" step="0.001" value="1.337" />
      <select id="channel"><option>Email</option><option>Console</option><option>Manual</option></select>
      <button id="createBtn">Create Triple-Entry Bid</button>
      <button id="anchorBtn" class="secondary">Anchor</button>
    </div>
  </div>

  <div class="card">
    <h3>Ledger</h3>
    <table>
      <thead><tr><th>Time</th><th>Name</th><th>Amount</th><th>Channel</th><th>tripleEntryHash</th></tr></thead>
      <tbody id="ledgerBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Framework</h3>
    <pre id="framework"></pre>
  </div>
</div>
<script>
const FRAMEWORK_SYNTHESIS = `SpineAlignTime Synthesis\n- Ingest every whisper as ceremony\n- Seal each event with triple-entry proof\n- Evolve state on dawn and dusk pulse\n- Expose global LedgerBridge for universal ingress`;

const state = {
  ledger: [],
  eventQueue: new Set(),
  systemTemp: 1.0,
  solanaSpineAnchored: false,
};

function hashString(value) {
  const enc = new TextEncoder().encode(value);
  return crypto.subtle.digest('SHA-256', enc).then(buf =>
    Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')
  );
}

async function dispatch(action) {
  if (action.type === 'INGEST_BID') {
    const key = `${action.payload.name}|${action.payload.amount}|${action.payload.channel}|${action.payload.sourceId||''}`;
    if (state.eventQueue.has(key)) return;
    state.eventQueue.add(key);
    const tripleEntryHash = await hashString(`${Date.now()}::${JSON.stringify(action.payload)}`);
    state.ledger.unshift({ ...action.payload, tripleEntryHash, ts: new Date().toISOString() });
  }
  if (action.type === 'EVOLVE_SYSTEM') state.systemTemp += 0.001;
  if (action.type === 'ANCHOR_SOLANA') state.solanaSpineAnchored = true;
  render();
}

function useCeremonyScheduler() {
  setInterval(() => {
    const now = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (hhmm === '06:00' || hhmm === '18:00') dispatch({ type:'EVOLVE_SYSTEM' });
  }, 60_000);
}

function connectLedgerBridgeStream() {
  const tag = document.getElementById('streamTag');
  const es = new EventSource('/api/ledgerbridge/stream');
  es.onopen = () => tag.textContent = 'Bridge Stream: Connected';
  es.onerror = () => tag.textContent = 'Bridge Stream: Reconnecting...';
  es.addEventListener('bid', (event) => {
    try { dispatch({ type:'INGEST_BID', payload: JSON.parse(event.data) }); } catch {}
  });
}

window.LedgerBridge = {
  ingest(payload) {
    return dispatch({ type: 'INGEST_BID', payload });
  }
};

function render() {
  document.getElementById('solanaTag').textContent = state.solanaSpineAnchored ? 'Solana Anchored' : 'Solana Pending';
  document.getElementById('tempTag').textContent = `System Temp: ${state.systemTemp.toFixed(3)}`;
  document.getElementById('framework').textContent = FRAMEWORK_SYNTHESIS;
  const body = document.getElementById('ledgerBody');
  body.innerHTML = state.ledger.map(e => `<tr><td>${e.ts}</td><td>${e.name}</td><td>${e.amount}</td><td>${e.channel}</td><td><code>${e.tripleEntryHash.slice(0,16)}...</code></td></tr>`).join('');
}

document.getElementById('createBtn').onclick = () => {
  dispatch({ type:'INGEST_BID', payload:{
    name: document.getElementById('name').value,
    amount: Number(document.getElementById('amount').value),
    channel: document.getElementById('channel').value,
  }});
};
document.getElementById('anchorBtn').onclick = () => dispatch({ type:'ANCHOR_SOLANA' });

render();
useCeremonyScheduler();
connectLedgerBridgeStream();
</script>
</body>
</html>
