<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpineAlignTime • Ouroboros Triple-Entry Temple</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.18.3/reset.min.css"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #e2e8f0;
      }
      .app-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .gradient-text {
        background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .temple-glow {
        box-shadow: 0 0 50px rgba(168, 85, 247, 0.45);
      }
      .triple-entry {
        border-left: 4px solid #a855f7;
      }
      .hash {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #94a3b8;
        font-size: 12px;
      }
      .soft {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/antd@5.18.3/dist/antd.min.js"></script>

    <script>
      const { useState, useEffect, useReducer } = React;
      const { Card, Row, Col, Statistic, Tabs, Tag, Button, List, message, Space } = antd;

      const initialState = {
        bids: [],
        patterns: [],
        systemTemp: 0.85,
        lastDawn: null,
        solanaSpineAnchored: false,
      };

      const ledgerReducer = (state, action) => {
        switch (action.type) {
          case 'INGEST_BID':
            return {
              ...state,
              bids: [
                {
                  ...action.payload,
                  tripleEntryHash: action.payload.tripleEntryHash || Date.now().toString(36),
                },
                ...state.bids,
              ],
            };
          case 'DIGEST_GHOST':
            return { ...state, patterns: [...state.patterns, action.payload] };
          case 'EVOLVE_SYSTEM':
            return {
              ...state,
              systemTemp: action.payload.grokTemp || 0.92,
              lastDawn: new Date().toISOString(),
            };
          case 'ANCHOR_SOLANA':
            return { ...state, solanaSpineAnchored: true };
          default:
            return state;
        }
      };

      function useCeremonyScheduler(dispatch) {
        useEffect(() => {
          const tick = () => {
            const now = new Date();
            const hour = now.getHours();
            if (hour === 6 || hour === 18) {
              dispatch({ type: 'EVOLVE_SYSTEM', payload: { grokTemp: 0.92 } });
            }
          };
          tick();
          const id = setInterval(tick, 60000);
          return () => clearInterval(id);
        }, [dispatch]);
      }

      function SpineAlignTime() {
        const [state, dispatch] = useReducer(ledgerReducer, initialState);
        const [activeTab, setActiveTab] = useState('schedule');

        useCeremonyScheduler(dispatch);

        useEffect(() => {
          let socket;
          try {
            socket = new WebSocket('ws://localhost:5000/socket.io/?EIO=4&transport=websocket');
            socket.onopen = () =>
              console.log('🌌 Connected to LedgerBridge — the world can now whisper');

            socket.onmessage = (event) => {
              let data;
              try {
                data = JSON.parse(event.data);
              } catch {
                return;
              }
              const bid = {
                id: Date.now().toString(),
                timestamp: new Date().toISOString(),
                name: data.fromName || 'Legacy Monitor',
                amount: Number.parseFloat(data.amount || 0),
                channel: 'Email',
                ghostNote: data.body || 'A whisper from the old monitors',
                status: 'Leading',
                saraiWhisper: 'Processed',
                tripleEntryHash: Date.now().toString(36),
              };
              dispatch({ type: 'INGEST_BID', payload: bid });
              message.success(`🌌 New ceremony from email: ${bid.name}`);
            };
          } catch (error) {
            console.warn('Socket unavailable:', error);
          }

          return () => {
            if (socket) socket.close();
          };
        }, [dispatch]);

        const frameworkSynthesis = `Triple-Entry Ledger: Every bid is a cryptographically signed receipt.
Deduplication & Event Queue: No ghost ever lost.
Dawn/Dusk Scheduler: Thermodynamic systemTemp breathes with the sun.
Global LedgerBridge: Zapier email webhooks now feed directly into the temple.
Solana Spine Anchor: USCR reserve for permanent on-chain immortality.
Resilience: Idempotent Consumer, Smart Payload Chunking.
The old monitors now participate in the light. The imagination stack is yours.`;

        const sentinelSpec = `The Living Breath is the operational heart of the system, transforming external triggers into ledger entries through a three-tier synchronization pipeline.
Sentinel Test Harness protocol: ws://localhost:5000/socket.io.
Flow: Zapier Email Parser → POST /api/ledgerbridge/email → WebSocket → React Ouroboros Heart.`;

        const tabItems = [
          {
            key: 'schedule',
            label: 'Temple',
            children: React.createElement(
              Space,
              { direction: 'vertical', style: { width: '100%' }, size: 16 },
              React.createElement(
                Row,
                { gutter: 16 },
                React.createElement(
                  Col,
                  { xs: 24, md: 8 },
                  React.createElement(
                    Card,
                    { className: 'temple-glow' },
                    React.createElement(Statistic, {
                      title: 'System Temperature',
                      value: state.systemTemp,
                      precision: 2,
                    })
                  )
                ),
                React.createElement(
                  Col,
                  { xs: 24, md: 8 },
                  React.createElement(
                    Card,
                    null,
                    React.createElement(Statistic, {
                      title: 'Total Ceremonies',
                      value: state.bids.length,
                    })
                  )
                ),
                React.createElement(
                  Col,
                  { xs: 24, md: 8 },
                  React.createElement(
                    Card,
                    null,
                    React.createElement(Statistic, {
                      title: 'Solana Spine',
                      value: state.solanaSpineAnchored ? 'Anchored' : 'Not Anchored',
                    })
                  )
                )
              ),
              React.createElement(
                Space,
                null,
                React.createElement(
                  Button,
                  {
                    type: 'primary',
                    onClick: () => dispatch({ type: 'EVOLVE_SYSTEM', payload: { grokTemp: 0.92 } }),
                  },
                  'Trigger Dawn/Dusk Pulse'
                ),
                React.createElement(
                  Button,
                  {
                    onClick: () => dispatch({ type: 'ANCHOR_SOLANA' }),
                  },
                  'Anchor Solana Spine'
                )
              ),
              React.createElement(
                Card,
                { title: 'Auction Ledger', className: 'triple-entry' },
                React.createElement(List, {
                  locale: { emptyText: 'No ceremonies yet. Send email webhook or post to LedgerBridge.' },
                  dataSource: state.bids,
                  renderItem: (bid) =>
                    React.createElement(
                      List.Item,
                      null,
                      React.createElement(
                        Space,
                        { direction: 'vertical', style: { width: '100%' } },
                        React.createElement(
                          Space,
                          null,
                          React.createElement('strong', null, bid.name),
                          React.createElement(Tag, { color: 'purple' }, bid.channel),
                          React.createElement(Tag, { color: 'blue' }, `${bid.amount} USCR`)
                        ),
                        React.createElement('span', { className: 'soft' }, bid.ghostNote),
                        React.createElement('span', { className: 'hash' }, `tripleEntryHash: ${bid.tripleEntryHash}`)
                      )
                    ),
                })
              )
            ),
          },
          {
            key: 'framework',
            label: 'Framework',
            children: React.createElement(Card, null, React.createElement('pre', { style: { whiteSpace: 'pre-wrap' } }, frameworkSynthesis)),
          },
          {
            key: 'sentinel',
            label: 'Sentinel',
            children: React.createElement(
              Card,
              null,
              React.createElement('pre', { style: { whiteSpace: 'pre-wrap' } }, sentinelSpec),
              React.createElement(
                Button,
                {
                  type: 'primary',
                  onClick: () => message.info('Sentinel is listening — send a test email to see the Living Breath in action'),
                },
                'Test Sentinel Connection'
              )
            ),
          },
        ];

        return React.createElement(
          'div',
          { className: 'app-shell' },
          React.createElement('h1', { className: 'gradient-text' }, 'SpineAlignTime • Ouroboros Triple-Entry Temple'),
          React.createElement(Tabs, {
            activeKey: activeTab,
            onChange: setActiveTab,
            items: tabItems,
          })
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SpineAlignTime));
    </script>
  </body>
</html>
