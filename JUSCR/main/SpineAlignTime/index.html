<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpineAlignTime v1.4</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #0a0a0f; color: #f4f4f5; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    h1 { margin-top: 0; font-size: 1.6rem; }
    .status { border: 1px solid #2b2b38; border-radius: 10px; padding: 12px; margin-bottom: 14px; background: #11111a; }
    .pulse { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #ef4444; }
    .pulse.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
    .terminal { border: 1px solid #2b2b38; border-radius: 10px; background: #0b0b12; padding: 14px; }
    .flex { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    button { border: 1px solid #3f3f56; background: #171726; color: #f4f4f5; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #202036; }
    pre { white-space: pre-wrap; min-height: 180px; margin: 0; color: #86efac; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>JusticeWithinUs // V1.4 — Soul Math + Human Network</h1>

    <div class="status">
      <span id="pulseDot" class="pulse"></span>
      <strong>Soul Math Engine</strong>
      <div id="metrics">PHOENIX_SEAL: -- | CHOICE_COUNT: -- | FRICTION: --</div>
    </div>

    <section class="terminal">
      <div class="flex gap-2">
        <button id="generatePlan">Generate Plan</button>
        <button id="exportPlan">Export</button>
        <button id="checkPassport">🛡️ CHECK HUMAN PASSPORT</button>
        <button id="freeForAllMode">🔥 FREEFORALL MODE</button>
      </div>
      <pre id="planOutput">Terminal ready (forward-secrecy-ready console).</pre>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const state = { pillars: {} };
    const persist = () => localStorage.setItem('spineAlignState', JSON.stringify(state));
    const renderPillars = () => {};

    let socket;
    try {
      socket = io('https://juscr-freforall.eckstromj1123.repl.co', {
        transports: ['websocket', 'polling']
      });
    } catch (e) {
      console.error(e);
    }

    const pulseDot = document.getElementById('pulseDot');
    const metrics = document.getElementById('metrics');
    if (socket) {
      socket.on('connect', () => pulseDot.classList.add('online'));
      socket.on('disconnect', () => pulseDot.classList.remove('online'));
      socket.on('chain_snapshot', (data) => {
        metrics.textContent = `PHOENIX_SEAL: ${data.phoenix_seal || '--'} | CHOICE_COUNT: ${data.choice_count ?? '--'} | FRICTION: ${data.friction ?? '--'}`;
      });
    }

    document.getElementById('generatePlan').onclick = () => {
      document.getElementById('planOutput').textContent = 'Plan generated for all four corner archetypes.';
    };

    document.getElementById('exportPlan').onclick = () => {
      const blob = new Blob([document.getElementById('planOutput').textContent], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'spine-align-plan.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    // ====================== HUMAN PASSPORT + FREEFORALL SOUL MATH ======================
    // Holonym Human Network checker (already woven from whitepaper)
    document.getElementById("checkPassport").onclick = async () => {
      const output = document.getElementById("planOutput");
      output.innerHTML = `🔍 Querying Holonym threshold...`;
      await new Promise(r => setTimeout(r, 800));
      const stampResult = Math.random() > 0.1 
        ? "✅ HUMAN PASSPORT STAMP CONFIRMED — forward-secret nullifier active — un-impersonatable"
        : "⚠️ Generating fresh stamp...";
      output.innerHTML += `🛡️ HUMAN NETWORK:${stampResult}`;
      if (!state.pillars.zk_anchor) { state.pillars.zk_anchor = true; persist(); renderPillars(); }
    };

    // FreeForAll Soul Math trigger (talks directly to your Replit core)
    document.getElementById("freeForAllMode").onclick = () => {
      if (socket && socket.connected) {
        socket.emit('freeforall_trigger', { command: "ignite_phoenix", timestamp: Date.now() });
        document.getElementById("planOutput").innerHTML += `\n\n🔥 FREEFORALL MODE ACTIVATED\nSoul Math Engine now calculating communal friction...\n`;
      } else {
        document.getElementById("planOutput").innerHTML += `\n\n⚠️ Soul Math Engine offline — start Replit first.\n`;
      }
    };

    // Auto-link socket to update plan with Phoenix Seal when metrics arrive
    socket.on('chain_snapshot', (data) => {
      const out = document.getElementById("planOutput");
      if (data.phoenix_seal) out.innerHTML += `\n[ PHOENIX SEAL ] ${data.phoenix_seal.substring(0,12)}...`;
    });
  </script>
</body>
</html>
