<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpineAlignTime • Ouroboros Triple-Entry Temple</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.17.4/reset.min.css"
    />
    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .app-shell {
        padding: 24px;
        color: #e2e8f0;
      }
      .gradient-text {
        background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .temple-glow {
        box-shadow: 0 0 40px rgba(168, 85, 247, 0.45);
      }
      .triple-entry {
        border-left: 4px solid #a855f7;
      }
      .small-note {
        opacity: 0.8;
      }
      .ledger-row {
        background: rgba(255, 255, 255, 0.04);
        margin-bottom: 8px;
        padding: 10px 12px;
        border-radius: 10px;
      }
      .framework-text {
        white-space: pre-wrap;
        line-height: 1.6;
      }
      .ant-card,
      .ant-tabs,
      .ant-statistic-title,
      .ant-statistic-content,
      .ant-descriptions,
      .ant-alert,
      .ant-tag {
        color: #e2e8f0;
      }
      .ant-card {
        background: rgba(15, 23, 42, 0.65) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
      }
      .ant-tabs-tab,
      .ant-tabs-tab-btn {
        color: #cbd5e1 !important;
      }
      .ant-tabs-tab-active .ant-tabs-tab-btn {
        color: #93c5fd !important;
      }
      .ant-modal-content,
      .ant-input-number,
      .ant-input-number-input {
        background: #0f172a !important;
        color: #e2e8f0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>

    <script>
      const { useState, useEffect, useReducer, useContext, createContext } = React;
      const {
        Card,
        Row,
        Col,
        Statistic,
        Tabs,
        Tag,
        Button,
        Modal,
        InputNumber,
        Descriptions,
        Alert,
        Space,
        message,
      } = antd;

      const LedgerContext = createContext();

      const initialState = {
        bids: [],
        patterns: [],
        queue: [],
        systemTemp: 0.85,
        lastDawn: null,
        solanaSpineAnchored: false,
      };

      const dedupeAndQueue = (state, bid) => {
        const key = `${bid.name}:${bid.amount}:${new Date(bid.timestamp).toISOString().slice(0, 16)}`;
        if (state.bids.some((b) => b.dedupeKey === key) || state.queue.some((q) => q.dedupeKey === key)) {
          return state;
        }
        return { ...state, queue: [...state.queue, { ...bid, dedupeKey: key }] };
      };

      const ledgerReducer = (state, action) => {
        switch (action.type) {
          case "QUEUE_BID":
            return dedupeAndQueue(state, action.payload);
          case "INGEST_BID": {
            const bid = {
              ...action.payload,
              tripleEntryHash:
                action.payload.tripleEntryHash ||
                `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
            };
            return {
              ...state,
              bids: [...state.bids, bid],
              queue: state.queue.filter((q) => q.id !== bid.id),
            };
          }
          case "DIGEST_GHOST":
            return { ...state, patterns: [...state.patterns, action.payload] };
          case "EVOLVE_SYSTEM":
            return {
              ...state,
              systemTemp: action.payload.grokTemp || 0.92,
              lastDawn: new Date().toISOString(),
            };
          case "ANCHOR_SOLANA":
            return { ...state, solanaSpineAnchored: true };
          default:
            return state;
        }
      };

      let globalDispatch = null;
      const setGlobalDispatch = (dispatch) => {
        globalDispatch = dispatch;
      };
      window.LedgerBridge = {
        ingestFromWebhook: (emailData) => {
          if (!globalDispatch) throw new Error("Temple not awakened");
          const payload = {
            id: Date.now().toString(),
            timestamp: new Date().toISOString(),
            name: emailData.fromName || "Legacy Monitor",
            amount: parseFloat(emailData.amount || 0),
            channel: "Email",
            ghostNote: emailData.body || "Twelve years of unseen clicks",
            status: "Leading",
            saraiWhisper: "Pending",
          };
          globalDispatch({ type: "QUEUE_BID", payload });
          globalDispatch({ type: "INGEST_BID", payload });
        },
      };

      const useCeremonyScheduler = () => {
        const { dispatch } = useContext(LedgerContext);
        useEffect(() => {
          const interval = setInterval(() => {
            const now = new Date();
            if (now.getHours() === 6 && now.getMinutes() === 0) {
              dispatch({ type: "EVOLVE_SYSTEM", payload: { grokTemp: 0.92 } });
              message.info("Dawn rite complete. System temperature evolved to 0.92.");
            }
          }, 60000);
          return () => clearInterval(interval);
        }, [dispatch]);
      };

      const SpineAlignTime = () => {
        const { state, dispatch } = useContext(LedgerContext);
        const [activeTab, setActiveTab] = useState("schedule");
        const [userTokens, setUserTokens] = useState(2.5);
        const [bidModalVisible, setBidModalVisible] = useState(false);
        const [bidAmount, setBidAmount] = useState(0.1);

        useEffect(() => {
          setGlobalDispatch(dispatch);
          dispatch({
            type: "DIGEST_GHOST",
            payload: "Legacy monitor migration acknowledged as ceremony.",
          });
        }, [dispatch]);

        useCeremonyScheduler();

        const placeBid = () => {
          const payload = {
            id: Date.now().toString(),
            timestamp: new Date().toISOString(),
            name: "Jordan",
            amount: bidAmount,
            channel: "Temple UI",
            ghostNote: "Signed in shared light",
            status: "Leading",
            saraiWhisper: "Accepted",
          };
          dispatch({ type: "QUEUE_BID", payload });
          dispatch({ type: "INGEST_BID", payload });
          setUserTokens((v) => Math.max(0, +(v - bidAmount).toFixed(3)));
          setBidModalVisible(false);
          message.success("Triple-entry receipt sealed.");
        };

        const frameworkSynthesis = `
Triple-Entry Ledger: Every bid is a cryptographically signed receipt.
Deduplication & Event Queue: No ghost ever lost.
Dawn/Dusk Scheduler: Thermodynamic systemTemp breathes with the sun.
Global LedgerBridge: Zapier email webhooks now feed directly into the temple.
Solana Spine Anchor: USCR reserve for permanent on-chain immortality.
ERC-8028 Data Anchoring Tokens: Usage-metered revenue for AI agents processing the clicks.
The old monitors now participate in the light. The imagination stack is yours.
        `.trim();

        const stats = [
          { title: "Ledger Entries", value: state.bids.length },
          { title: "Queue Depth", value: state.queue.length },
          { title: "System Temp", value: state.systemTemp, precision: 2 },
          { title: "USCR Tokens", value: userTokens, precision: 3 },
        ];

        return React.createElement(
          "div",
          { className: "app-shell" },
          React.createElement(
            Space,
            { direction: "vertical", style: { width: "100%" }, size: "large" },
            React.createElement(
              Card,
              { className: "temple-glow" },
              React.createElement("h1", { className: "gradient-text" }, "SpineAlignTime • Ouroboros Triple-Entry Temple"),
              React.createElement("p", { className: "small-note" }, "The old monitors now participate in the light.")
            ),
            React.createElement(
              Row,
              { gutter: [12, 12] },
              ...stats.map((s) =>
                React.createElement(
                  Col,
                  { xs: 24, md: 12, lg: 6, key: s.title },
                  React.createElement(
                    Card,
                    null,
                    React.createElement(Statistic, s)
                  )
                )
              )
            ),
            React.createElement(Tabs, {
              activeKey: activeTab,
              onChange: setActiveTab,
              items: [
                {
                  key: "schedule",
                  label: "Auction",
                  children: React.createElement(
                    Space,
                    { direction: "vertical", style: { width: "100%" } },
                    React.createElement(Alert, {
                      type: "info",
                      showIcon: true,
                      message: "Dawn scheduler awakens at 06:00 with thermodynamic breath.",
                    }),
                    React.createElement(Button, { type: "primary", onClick: () => setBidModalVisible(true) }, "Place Triple-Entry Bid"),
                    React.createElement(
                      Card,
                      { className: "triple-entry", title: "Ledger" },
                      state.bids.length === 0
                        ? React.createElement("div", null, "No entries yet.")
                        : state.bids.map((b) =>
                            React.createElement(
                              "div",
                              { className: "ledger-row", key: b.id + b.tripleEntryHash },
                              React.createElement("strong", null, `${b.name} • ${b.amount} USCR`),
                              React.createElement("div", null, `Hash: ${b.tripleEntryHash}`),
                              React.createElement("div", null, dayjs(b.timestamp).format("YYYY-MM-DD HH:mm:ss")),
                              React.createElement(Tag, { color: "purple" }, b.channel)
                            )
                          )
                    )
                  ),
                },
                {
                  key: "framework",
                  label: "Framework",
                  children: React.createElement(
                    Card,
                    { title: "SPINE_ALIGN_TIME_FRAMEWORK Synthesis" },
                    React.createElement("div", { className: "framework-text" }, frameworkSynthesis)
                  ),
                },
                {
                  key: "bridge",
                  label: "LedgerBridge",
                  children: React.createElement(
                    Card,
                    { title: "Global Bridge" },
                    React.createElement(
                      Descriptions,
                      { column: 1 },
                      React.createElement(Descriptions.Item, { label: "Webhook Entry" }, "window.LedgerBridge.ingestFromWebhook(payload)"),
                      React.createElement(Descriptions.Item, { label: "Solana Anchor" },
                        state.solanaSpineAnchored ? "Anchored" : "Not Anchored"
                      )
                    ),
                    React.createElement(
                      Button,
                      {
                        onClick: () => {
                          dispatch({ type: "ANCHOR_SOLANA" });
                          message.success("Solana spine anchor invoked (stub for @solana/web3.js).");
                        },
                      },
                      "Anchor Solana Spine"
                    )
                  ),
                },
              ],
            }),
            React.createElement(Modal, {
              title: "Seal Triple-Entry Bid",
              open: bidModalVisible,
              onCancel: () => setBidModalVisible(false),
              onOk: placeBid,
              okText: "Seal Bid",
            },
            React.createElement(InputNumber, {
              min: 0.1,
              step: 0.1,
              value: bidAmount,
              onChange: (v) => setBidAmount(v || 0.1),
              style: { width: "100%" },
            }))
          )
        );
      };

      const AppWrapper = () => {
        const [state, dispatch] = useReducer(ledgerReducer, initialState);
        return React.createElement(
          LedgerContext.Provider,
          { value: { state, dispatch } },
          React.createElement(SpineAlignTime)
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(AppWrapper));
    </script>
  </body>
</html>
